<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>ПУЛЬС</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%23000000'/><path d='M100 256h80l40-120 40 240 40-120h112' stroke='%23e8ff47' stroke-width='30' stroke-linecap='square' fill='none'/></svg>">

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            width: 80%;
            max-width: 300px;
            text-align: left;
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #e8ff47;
        }
        .field {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 10px 0;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-bottom-color: #e8ff47;
        }
        button {
            width: 100%;
            background: #e8ff47;
            border: none;
            padding: 15px;
            margin-top: 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        .link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Пульс</h1>
        <div class="field">
            <label>Почта</label>
            <input type="email" placeholder="email@example.com">
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" placeholder="******">
        </div>
        <button>Войти</button>
        <a href="#" class="link">Создать аккаунт</a>
    </div>
</body>
</html>
