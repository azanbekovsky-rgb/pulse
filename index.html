    <style>
        :root {
            --bg-color: #FFFDED; /* Тот самый мягкий желтый */
            --pulse-color: #FF453A; /* Красный для пульса */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 { font-weight: 700; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }

        /* Стиль кнопки, похожий на iOS */
        .pulse-btn {
            padding: 16px 32px;
            background-color: var(--pulse-color);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 69, 58, 0.4);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            -webkit-tap-highlight-color: transparent; /* Убираем синий блик при клике */
        }
        .pulse-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(255, 69, 58, 0.3);
        }
    </style>
</head>
<body>

    <h1>Пульс</h1>
    <p>Добавьте это приложение на экран «Домой» через меню «Поделиться» в Safari.</p>
    
    <button class="pulse-btn" onclick="togglePulse()">Тест индикатора на иконке</button>

    <script>
        let isPulsing = false;

        async function togglePulse() {
            if ('setAppBadge' in navigator) {
                try {
                    if (!isPulsing) {
                        await navigator.setAppBadge(); // Включить красную точку
                        alert("Индикатор (красная точка) включен! Проверьте иконку на домашнем экране.");
                        isPulsing = true;
                    } else {
                        await navigator.clearAppBadge(); // Убрать точку
                        alert("Индикатор выключен.");
                        isPulsing = false;
                    }
                } catch (e) {
                    console.error("Ошибка бейджа:", e);
                }
            } else {
                alert("Ваша версия iOS или режим Safari не поддерживают бейджи иконок.");
            }
        }
    </script>
</body>
</html>
