<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ПУЛЬС">
    
    <title>ПУЛЬС — Трекер</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --border: #222222;
            --accent: #F4D03F;
            --text: #FFFFFF;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            font-family: -apple-system, system-ui, sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        #app { width: 100%; max-width: 450px; height: 100%; display: flex; flex-direction: column; position: relative; }

        header {
            padding: 60px 25px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
        }

        main { flex: 1; overflow-y: auto; padding: 10px 20px 140px; -webkit-overflow-scrolling: touch; }

        .ex-card {
            background: var(--card); border-radius: 28px; padding: 20px;
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        .ex-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        
        .ex-icon-box {
            width: 45px; height: 45px; background: #1a1a1a; 
            border-radius: 14px; display: flex; align-items: center; 
            justify-content: center; font-size: 22px; border: 1px solid #333;
        }

        .ex-name { font-size: 1.2rem; font-weight: 700; }

        .set-row {
            display: flex; align-items: center; justify-content: space-between;
            background: #1a1a1a; padding: 12px 15px; border-radius: 18px; margin-bottom: 10px;
        }

        .input-group input {
            background: #252525; border: 1px solid #444; color: var(--accent);
            width: 65px; padding: 8px; border-radius: 12px; text-align: center;
            font-weight: 900; font-size: 1.1rem;
        }

        .btn-add {
            width: 100%; padding: 16px; background: transparent; border: 2px dashed #333;
            color: var(--accent); border-radius: 20px; font-weight: 800; cursor: pointer;
        }

        nav {
            position: absolute; bottom: 0; width: 100%; height: 95px;
            background: rgba(8, 8, 8, 0.98); border-top: 1px solid #222;
            display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 1000;
        }

        .nav-btn { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-dim); }
        .nav-btn.active { color: var(--accent); }
        .nav-label { font-size: 0.6rem; font-weight: 900; margin-top: 4px; letter-spacing: 1px; }

        .profile-card {
            background: var(--card); padding: 20px; border-radius: 24px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid var(--border);
        }
        .profile-card input {
            background: #1a1a1a; border: 1px solid #333; color: var(--accent);
            padding: 8px; border-radius: 10px; width: 80px; text-align: center; font-weight: bold;
        }

        [v-cloak] { display: none; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <header>
        <div class="brand">
            <svg width="90" height="30" viewBox="0 0 100 30" fill="none">
                <rect x="0" y="0" width="100" height="30" rx="10" fill="#F4D03F"/>
                <polyline 
                    points="5,15 20,15 25,5 30,25 35,15 50,15 55,10 60,20 65,15 95,15"
                    stroke="#000"
                    stroke-width="2"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                />
            </svg>
        </div>

        <div style="color: #444; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">
            {{ activeTab === 0 ? 'ТРЕНИНГ' : 'ПРОФИЛЬ' }}
        </div>
    </header>

    <main>
        <div v-if="activeTab === 0">
            <div v-for="(ex, exIdx) in exercises" :key="exIdx" class="ex-card">
                <div class="ex-header">
                    <div class="ex-icon-box">{{ ex.icon }}</div>
                    <span class="ex-name">{{ ex.name }}</span>
                </div>
                <div v-for="(set, sIdx) in ex.sets" :key="sIdx" class="set-row">
                    <span style="font-size: 0.7rem; color: #666; font-weight: 800;">СЕТ {{ sIdx + 1 }}</span>
                    <div class="input-group">
                        <input type="number" v-model="set.reps">
                        <button @click="ex.sets.splice(sIdx, 1)" style="background:none; border:none; color:#ff4444; font-size:1.5rem; margin-left:5px; cursor:pointer;">×</button>
                    </div>
                </div>
                <button class="btn-add" @click="ex.sets.push({reps: 0})">+ ДОБАВИТЬ ПОДХОД</button>
            </div>
        </div>

        <div v-if="activeTab === 1">
            <div class="profile-card"><label>Вес тела (кг)</label><input v-model="user.weight" type="number"></div>
            <div class="profile-card"><label>Рост (см)</label><input v-model="user.height" type="number"></div>
            <div class="profile-card"><label>Возраст (лет)</label><input v-model="user.age" type="number"></div>
            <div style="margin-top: 40px; text-align: center; padding: 0 10px;">
                <p style="color: var(--text-dim); font-size: 0.8rem; font-weight: 800; display:flex; justify-content:space-between;">
                    <span>ВРЕМЯ СНА</span>
                    <span style="color:var(--accent)">{{ sleepHours }} ч</span>
                </p>
                <input type="range" v-model="sleepHours" min="0" max="12" step="0.5" style="width:100%; accent-color:var(--accent)">
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-btn" :class="{ active: activeTab === 0 }" @click="activeTab = 0">
            <span style="font-size: 1.4rem;">⚡</span>
            <span class="nav-label">ТРЕНИНГ</span>
        </div>
        <div class="nav-btn" :class="{ active: activeTab === 1 }" @click="activeTab = 1">
            <span style="font-size: 1.4rem;">👤</span>
            <span class="nav-label">ПРОФИЛЬ</span>
        </div>
    </nav>
</div>

<script>
    const { createApp } = Vue
    createApp({
        data() {
            return {
                activeTab: 0,
                sleepHours: 8,
                user: { weight: 80, height: 180, age: 25 },
                exercises: [
                    { name: 'Подтягивания', icon: '💪', sets: [{reps: 10}] },
                    { name: 'Отжимания', icon: '👊', sets: [{reps: 20}] },
                    { name: 'Приседания', icon: '🦵', sets: [{reps: 15}] },
                    { name: 'Пресс', icon: '🔥', sets: [{reps: 30}] },
                    { name: 'Бег (км)', icon: '🏃', sets: [{reps: 5}] }
                ]
            }
        }
    }).mount('#app')
</script>

</body>
</html>
