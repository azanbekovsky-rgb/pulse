<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ПУЛЬС</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%23000000'/><path d='M80 256h60l35-120 40 280 45-360 40 400 40-200 40 100h82' stroke='%23e8ff47' stroke-width='35' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">

    <style>
        :root { --accent: #e8ff47; --bg: #000; --card: #151515; --gray: #888; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        .container { padding: 60px 20px 40px; max-width: 420px; margin: auto; min-height: 100vh; }
        
        /* Auth */
        #auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; height: 100vh; }
        h1 { font-size: 32px; letter-spacing: 5px; color: var(--accent); margin-bottom: 40px; font-weight: 900; }
        input { width: 100%; background: #111; border: 1px solid #222; padding: 18px; color: #fff; font-size: 16px; outline: none; margin-bottom: 15px; border-radius: 10px; }
        .btn-main { width: 100%; background: var(--accent); border: none; padding: 20px; font-weight: 900; text-transform: uppercase; border-radius: 10px; color: #000; }

        /* Dashboard */
        #app-content { display: none; }
        .card { background: var(--card); border-radius: 18px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; }
        .img-container { width: 100%; height: 150px; background: #222; position: relative; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-info { padding: 18px; }
        .card h3 { margin: 0; font-size: 18px; color: var(--accent); text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 12px; color: var(--gray); }

        /* Training Page */
        #training-page { display: none; }
        .timer-box { background: var(--accent); color: #000; border-radius: 15px; padding: 25px; text-align: center; margin: 25px 0; }
        #timer-display { font-size: 52px; font-weight: 900; font-variant-numeric: tabular-nums; }
        .progress-container { width: 100%; height: 8px; background: #1a1a1a; border-radius: 4px; margin: 20px 0; }
        #progress-bar { height: 100%; width: 0%; background: var(--accent); transition: 0.4s; border-radius: 4px; }
        
        .exercise-item { display: flex; align-items: center; background: #0c0c0c; padding: 18px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .exercise-item input { margin-right: 15px; width: 22px; height: 22px; accent-color: var(--accent); }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h1>ПУЛЬС</h1>
        <input type="email" id="email" placeholder="EMAIL">
        <input type="password" id="pass" placeholder="ПАРОЛЬ">
        <button class="btn-main" onclick="handleAuth()">ВОЙТИ</button>
        <p onclick="toggleMode()" id="mode-text" style="color:var(--gray); margin-top:25px; font-size:12px;">РЕГИСТРАЦИЯ</p>
    </div>

    <div id="app-content" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <div style="letter-spacing:2px; font-weight:900; color:var(--accent);">PULSE / WORKOUT</div>
            <span onclick="location.reload()" style="color:var(--gray); font-size:11px; border:1px solid #333; padding:5px 10px; border-radius:5px;">ВЫХОД</span>
        </div>

        <div class="grid">
            <div class="card" onclick="startWorkout('Турник', 'pullups', 'https://images.unsplash.com/photo-1590239098569-e611bb264f4b?w=500&q=80')">
                <div class="img-container"><img id="img-pullups" src="https://images.unsplash.com/photo-1590239098569-e611bb264f4b?w=500&q=80"></div>
                <div class="card-info"><h3>Турник</h3><p>Сила и мощь спины</p></div>
            </div>
            <div class="card" onclick="startWorkout('Брусья', 'dips', 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=500&q=80')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=500&q=80"></div>
                <div class="card-info"><h3>Брусья</h3><p>Проработка трицепса и груди</p></div>
            </div>
            <div class="card" onclick="startWorkout('Отжимания', 'pushups', 'https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=500&q=80')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=500&q=80"></div>
                <div class="card-info"><h3>Отжимания</h3><p>Классическая работа с весом</p></div>
            </div>
            <div class="card" onclick="startWorkout('Пресс', 'abs', 'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=500&q=80')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=500&q=80"></div>
                <div class="card-info"><h3>Пресс</h3><p>Стальной кор и выносливость</p></div>
            </div>
            <div class="card" onclick="startWorkout('Бег', 'run', 'https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=500&q=80')">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=500&q=80"></div>
                <div class="card-info"><h3>Бег</h3><p>Кардио и жиросжигание</p></div>
            </div>
        </div>
    </div>

    <div id="training-page" class="container">
        <p onclick="toDashboard()" style="color:var(--gray); font-size:12px; margin-bottom:20px;">← НАЗАД К ПЛАНАМ</p>
        <h2 id="training-title" style="color:var(--accent); text-transform:uppercase; margin:0;"></h2>
        
        <div class="progress-container"><div id="progress-bar"></div></div>

        <div class="timer-box">
            <div id="timer-display">00:00</div>
            <div style="margin-top:15px; display:flex; justify-content:center; gap:10px;">
                <button onclick="toggleTimer()" id="timer-btn" style="background:#000; color:#fff; border:none; padding:10px 25px; border-radius:8px; font-weight:bold;">СТАРТ</button>
                <button onclick="resetTimer()" style="background:transparent; border:1px solid #000; color:#000; padding:10px 20px; border-radius:8px;">СБРОС</button>
            </div>
        </div>

        <div id="exercise-list"></div>
    </div>

    <script>
        const exercises = {
            pullups: ["Классические: 3х10", "Широкий хват: 3х8", "Узкий хват: 3х8", "Вис: 60 сек"],
            dips: ["Брусья: 4х12", "Наклон вперед: 3х10", "Трицепс: 3х10"],
            pushups: ["Обычные: 4х20", "Алмазные: 3х12", "Широкие: 3х15"],
            abs: ["Скручивания: 3х30", "Подъем ног: 3х15", "Планка: 90 сек"],
            run: ["Разминка: 5 мин", "Бег: 15 мин", "Заминка: 5 мин"]
        };

        let isLogin = true;
        let timer;
        let sec = 0;
        let running = false;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'ВХОД' : 'РЕГИСТРАЦИЯ';
            document.getElementById('mode-text').innerText = isLogin ? 'РЕГИСТРАЦИЯ' : 'УЖЕ ЕСТЬ АККАУНТ? ВОЙТИ';
        }

        function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert('Заполни поля');
            if(isLogin) {
                if(localStorage.getItem(e) === p) {
                    document.getElementById('auth-screen').style.display='none';
                    document.getElementById('app-content').style.display='block';
                } else alert('Ошибка');
            } else {
                localStorage.setItem(e, p); alert('Создано!'); toggleMode();
            }
        }

        function startWorkout(name, type) {
            document.getElementById('app-content').style.display='none';
            document.getElementById('training-page').style.display='block';
            document.getElementById('training-title').innerText = name;
            const list = document.getElementById('exercise-list');
            list.innerHTML = '';
            exercises[type].forEach(ex => {
                list.innerHTML += `<div class="exercise-item"><input type="checkbox" onchange="updateProgress('${type}')"><span>${ex}</span></div>`;
            });
            updateProgress(type);
        }

        function updateProgress(type) {
            const total = exercises[type].length;
            const done = document.querySelectorAll('.exercise-item input:checked').length;
            document.getElementById('progress-bar').style.width = (done/total*100)+'%';
        }

        function toDashboard() {
            resetTimer();
            document.getElementById('training-page').style.display='none';
            document.getElementById('app-content').style.display='block';
        }

        function toggleTimer() {
            if(!running) {
                timer = setInterval(() => {
                    sec++;
                    let m = Math.floor(sec/60);
                    let s = sec%60;
                    document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
                document.getElementById('timer-btn').innerText = 'ПАУЗА';
            } else {
                clearInterval(timer);
                document.getElementById('timer-btn').innerText = 'СТАРТ';
            }
            running = !running;
        }

        function resetTimer() {
            clearInterval(timer); running = false; sec = 0;
            document.getElementById('timer-display').innerText = '00:00';
            document.getElementById('timer-btn').innerText = 'СТАРТ';
        }
    </script>
</body>
</html>
